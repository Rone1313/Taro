<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Таро Кристиночки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Marck+Script&family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: var(--tg-theme-bg-color, #1A0F1F);
  --bg2: var(--tg-theme-secondary-bg-color, #2A1A2F);
  --text: var(--tg-theme-text-color, #F5E6C8);
  --text2: var(--tg-theme-hint-color, #B8A888);
  --accent: #E8B847;
  --accent-dark: #9B7820;
  --deep: #5C1818;
  --border: rgba(232, 184, 71, 0.25);
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Manrope', system-ui, sans-serif;
  --script: 'Marck Script', cursive;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(232,184,71,0.06), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(92,24,24,0.15), transparent 40%);
  background-attachment: fixed;
}
.header { text-align: center; margin-bottom: 20px; padding-top: 8px; }
.header h1 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 28px;
  margin: 0 0 4px;
  letter-spacing: 1px;
  color: var(--accent);
}
.header .sub { font-size: 12px; color: var(--text2); }
.counter { font-size: 12px; color: var(--text2); margin-top: 6px; }
.counter .infinity { color: var(--accent); }

.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 12px; background: transparent; border: none;
  border-bottom: 2px solid transparent; color: var(--text2);
  font-family: var(--sans); font-size: 14px; cursor: pointer;
  transition: all 0.2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.section-label {
  font-size: 11px; color: var(--text2); margin-bottom: 8px;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.grid-row { display: grid; gap: 8px; margin-bottom: 16px; }
.grid-themes { grid-template-columns: repeat(2, 1fr); }
.grid-modes { grid-template-columns: 1fr; }
@media (min-width: 380px) { .grid-themes { grid-template-columns: repeat(4, 1fr); } }

.chip {
  padding: 10px 8px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: var(--sans);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.chip.active {
  background: rgba(232,184,71,0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.chip-icon { font-size: 14px; }

.mode-card {
  padding: 14px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text); cursor: pointer; transition: all 0.2s;
  text-align: left;
}
.mode-card.active {
  border-color: var(--accent);
  background: rgba(232,184,71,0.08);
}
.mode-card .title { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
.mode-card .desc { font-size: 12px; color: var(--text2); }

.input-field {
  width: 100%; padding: 12px 14px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 14px;
}
.input-field::placeholder { color: var(--text2); }
.input-field:focus { outline: none; border-color: var(--accent); }

.sound-row {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px;
  background: var(--bg2); border-radius: 10px; font-size: 13px;
  color: var(--text2); margin-bottom: 16px;
}
.sound-row input { cursor: pointer; accent-color: var(--accent); }

.btn-main {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--deep) 0%, #3A0E0E 100%);
  color: var(--accent); border: 1px solid var(--accent);
  border-radius: 12px; font-family: var(--serif); font-size: 17px;
  font-weight: 500; letter-spacing: 1.5px; cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-main:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,184,71,0.2); }
.btn-main:active { transform: translateY(0); }

.tcard { width: 100%; aspect-ratio: 2/3.5; border-radius: 10px; overflow: hidden; perspective: 1000px; }
.flipper { position: relative; width: 100%; height: 100%; transition: transform 1.1s cubic-bezier(0.4,0,0.2,1); transform-style: preserve-3d; }
.flipper.flipped { transform: rotateY(180deg); }
.face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 10px; overflow: hidden; }
.back { transform: rotateY(0deg); }
.front { transform: rotateY(180deg); }
.front.rev svg { transform: rotate(180deg); }

.result { margin-top: 24px; }
.question-box {
  padding: 14px 16px; background: var(--bg2); border-left: 3px solid var(--accent);
  border-radius: 8px; margin-bottom: 20px; font-family: var(--serif);
  font-style: italic; font-size: 15px; line-height: 1.5;
}
.single-result { display: flex; flex-direction: column; align-items: center; }
.single-result .label {
  font-size: 11px; color: var(--text2); margin-bottom: 12px;
  letter-spacing: 2px; text-transform: uppercase;
}
.single-result .tcard { width: 200px; max-width: 70%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); margin-bottom: 18px; }
.reversed-note { font-size: 11px; color: var(--text2); margin-bottom: 10px; font-style: italic; }
.meaning-box {
  padding: 18px 20px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; font-family: var(--serif); font-size: 16px;
  line-height: 1.6; text-align: center; max-width: 480px;
}

.row-cards { display: grid; gap: 6px; margin-bottom: 20px; }
.row-cards.cols-3 { grid-template-columns: repeat(3, 1fr); }
.row-cards.cols-5 { grid-template-columns: repeat(5, 1fr); }
.row-card-item { display: flex; flex-direction: column; align-items: center; }
.row-card-item .label {
  font-size: 10px; color: var(--text2); text-align: center;
  margin-bottom: 6px; min-height: 26px; line-height: 1.2; letter-spacing: 0.3px;
}
.row-card-item .tcard { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }

.cinfo { opacity: 0; transition: opacity 0.6s ease; }
.cinfo.show { opacity: 1; }
.meaning-item {
  margin-bottom: 12px; padding: 14px 16px; background: var(--bg2);
  border-left: 3px solid var(--accent); border-radius: 8px;
}
.meaning-item .head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 6px; flex-wrap: wrap; gap: 6px;
}
.meaning-item .ctitle { font-weight: 500; font-size: 14px; font-family: var(--serif); }
.meaning-item .rev-tag {
  font-size: 10px; padding: 2px 8px; background: rgba(232,184,71,0.15);
  border: 1px solid var(--border); border-radius: 8px; margin-left: 6px;
  color: var(--accent);
}
.meaning-item .arc { font-size: 11px; color: var(--text2); }
.meaning-item .text { font-size: 14px; line-height: 1.5; color: var(--text); }
.hint-box {
  margin-top: 16px; padding: 12px 16px; background: var(--bg2);
  border-radius: 10px; font-size: 13px; color: var(--text2);
  font-style: italic; font-family: var(--serif); text-align: center;
}

.paywall {
  background: linear-gradient(135deg, #2A0808 0%, #0F0303 100%);
  border: 1px solid var(--accent);
  border-radius: 16px; padding: 28px 22px; text-align: center;
  margin-top: 20px;
  box-shadow: 0 8px 32px rgba(232,184,71,0.15);
}
.paywall .star { font-size: 36px; margin-bottom: 8px; color: var(--accent); }
.paywall h2 { margin: 0 0 10px; font-family: var(--serif); font-weight: 500; font-size: 22px; color: var(--accent); }
.paywall p { margin: 0 0 20px; font-size: 14px; line-height: 1.6; color: var(--text); }
.paywall .quote {
  font-family: var(--script); font-size: 24px; color: var(--accent);
  margin-bottom: 16px; line-height: 1.3;
}
.card-display {
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 16px;
}
.card-num {
  font-family: monospace; font-size: 16px; letter-spacing: 1.5px;
  margin-bottom: 10px; color: var(--accent);
}
.copy-btn {
  background: rgba(232,184,71,0.1); color: var(--accent);
  border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-size: 12px; font-family: var(--sans);
}
.copy-msg { margin-top: 8px; font-size: 11px; color: #8BC78B; min-height: 14px; }
.pay-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
.pay-opt {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 8px; cursor: pointer; position: relative;
  transition: all 0.2s;
}
.pay-opt.selected { border: 2px solid var(--accent); background: rgba(232,184,71,0.1); }
.pay-opt .price { font-size: 22px; font-weight: 600; color: var(--accent); font-family: var(--serif); }
.pay-opt .desc { font-size: 11px; color: var(--text2); margin-top: 4px; }
.pay-opt .badge {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #2A0808; font-size: 9px;
  padding: 2px 10px; border-radius: 8px; font-weight: 600;
  letter-spacing: 0.5px;
}
.confirm-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
  color: #2A0808; border: none; border-radius: 10px;
  cursor: pointer; font-family: var(--serif); font-weight: 600;
  font-size: 15px; letter-spacing: 0.5px;
}
.reset-btn {
  margin-top: 10px; background: transparent; color: var(--text2);
  border: none; padding: 6px; cursor: pointer; font-size: 11px;
  text-decoration: underline; opacity: 0.5; font-family: var(--sans);
}

.history-empty {
  text-align: center; padding: 60px 20px; color: var(--text2);
  font-style: italic; font-family: var(--serif); font-size: 15px;
}
.hist-item {
  padding: 14px 16px; margin-bottom: 10px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 10px;
}
.hist-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px; font-size: 12px;
}
.hist-theme { color: var(--accent); }
.hist-date { color: var(--text2); }
.hist-q { font-size: 13px; font-style: italic; color: var(--text2);
  margin-bottom: 6px; font-family: var(--serif); }
.hist-cards { font-size: 13px; color: var(--text); }
.clear-btn {
  margin-top: 14px; padding: 10px 16px; background: transparent;
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 12px; color: var(--text2); font-family: var(--sans);
  width: 100%;
}

.footer {
  margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text2); text-align: center; font-style: italic;
}

.hint-after {
  margin-top: 16px; padding: 12px 16px;
  background: rgba(232,184,71,0.08); border: 1px solid var(--border);
  border-radius: 10px; font-size: 12px; color: var(--accent);
  text-align: center; font-family: var(--serif); font-style: italic;
}
</style>
</head>
<body>

<div class="header">
  <h1>⚜ Таро Кристиночки ⚜</h1>
  <div class="counter" id="counter"></div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="draw">✦ Расклад</button>
  <button class="tab" data-tab="history">⌛ История</button>
</div>

<div id="tab-draw">
  <div class="section-label">Тема расклада</div>
  <div class="grid-row grid-themes" id="themes">
    <button class="chip active" data-theme="general"><span class="chip-icon">✦</span>Общий</button>
    <button class="chip" data-theme="love"><span class="chip-icon">♥</span>Любовь</button>
    <button class="chip" data-theme="work"><span class="chip-icon">⚒</span>Работа</button>
    <button class="chip" data-theme="health"><span class="chip-icon">❀</span>Здоровье</button>
  </div>

  <div class="section-label">Формат расклада</div>
  <div class="grid-row grid-modes" id="modes">
    <button class="mode-card active" data-mode="1">
      <div class="title">Карта дня</div>
      <div class="desc">1 карта · быстрый совет</div>
    </button>
    <button class="mode-card" data-mode="3">
      <div class="title">Три карты</div>
      <div class="desc" id="d3">Прошлое · настоящее · будущее</div>
    </button>
    <button class="mode-card" data-mode="5">
      <div class="title">Ситуация</div>
      <div class="desc" id="d5">5 карт · подробный анализ</div>
    </button>
  </div>

  <input id="q" class="input-field" type="text" placeholder="Твой вопрос (необязательно)..." style="margin-bottom: 14px;"/>

  <div class="sound-row">
    <span style="font-size: 14px;">♪</span>
    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
      <input type="checkbox" id="snd" checked> Звук перелистывания
    </label>
  </div>

  <button id="draw" class="btn-main">✦ Вытянуть карты ✦</button>

  <div id="pw" style="display: none;"></div>
  <div id="res" class="result"></div>
</div>

<div id="tab-history" style="display: none;">
  <div id="hlist"></div>
</div>

<div class="footer">
  Карты — зеркало для размышлений, а не предсказание судьбы. Решения всегда за тобой.
</div>

<script>
// === Telegram WebApp init ===
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  try { tg.setHeaderColor('#1A0F1F'); } catch(e){}
  try { tg.setBackgroundColor('#1A0F1F'); } catch(e){}
}

// === STATE ===
let used = parseInt(localStorage.getItem('tarot_used') || '0');
let extra = parseInt(localStorage.getItem('tarot_extra') || '0');
let unlim = localStorage.getItem('tarot_unlim') === 'true';
const FREE = 3;

function saveSt() {
  localStorage.setItem('tarot_used', String(used));
  localStorage.setItem('tarot_extra', String(extra));
  localStorage.setItem('tarot_unlim', String(unlim));
}
function canDraw() { return unlim || used < FREE || extra > 0; }
function consume() {
  if (unlim) return;
  if (used < FREE) used++;
  else if (extra > 0) extra--;
}
function updCnt() {
  const el = document.getElementById('counter');
  if (unlim) { el.innerHTML = '<span class="infinity">∞ безлимит активирован</span>'; return; }
  const free = Math.max(0, FREE - used);
  if (free > 0 && extra === 0) el.textContent = `Бесплатных раскладов: ${free} из ${FREE}`;
  else if (extra > 0) el.textContent = `Раскладов осталось: ${free + extra}`;
  else el.textContent = '✦ Бесплатные расклады использованы ✦';
}

// === SOUND ===
let actx = null;
function playFlip() {
  if (!document.getElementById('snd').checked) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const now = actx.currentTime, sz = actx.sampleRate * 0.15;
    const buf = actx.createBuffer(1, sz, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/sz, 2.5);
    const s = actx.createBufferSource(); s.buffer = buf;
    const f = actx.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = 2500; f.Q.value = 1.2;
    const g = actx.createGain(); g.gain.value = 0.12;
    s.connect(f); f.connect(g); g.connect(actx.destination); s.start(now);
    const o = actx.createOscillator(), og = actx.createGain();
    o.frequency.value = 180;
    og.gain.setValueAtTime(0.06, now);
    og.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    o.connect(og); og.connect(actx.destination); o.start(now); o.stop(now + 0.08);
  } catch(e) {}
}
</script>

<script src="cards.js"></script>
<script src="art.js"></script>
<script src="app.js"></script>
</body>
</html>
